version: '3.8'

services:
  backend:
    build: ./backend
    container_name: uvap-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - ml_service

  frontend:
    build: ./frontend
    container_name: uvap-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

  ml_service:
    build: ./ml_service
    container_name: uvap-ml-service
    restart: always
    ports:
      - "5001:5001"

  nginx:
    image: nginx:alpine
    container_name: uvap-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
