name: Deploy UVAP Live Version

on:
  push:
    branches:
      - main
    paths:
      - 'live_version_uvap/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Build and push Backend
      uses: docker/build-push-action@v4
      with:
        context: ./live_version_uvap/backend
        push: true
        tags: ${{ secrets.DOCKER_HUB_USERNAME }}/uvap-backend:latest

    - name: Build and push Frontend
      uses: docker/build-push-action@v4
      with:
        context: ./live_version_uvap/frontend
        push: true
        tags: ${{ secrets.DOCKER_HUB_USERNAME }}/uvap-frontend:latest

    - name: Build and push ML Service
      uses: docker/build-push-action@v4
      with:
        context: ./live_version_uvap/ml_service
        push: true
        tags: ${{ secrets.DOCKER_HUB_USERNAME }}/uvap-ml-service:latest

    - name: Deploy to Production Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /path/to/app
          docker-compose pull
          docker-compose up -d
